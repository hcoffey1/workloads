# Workload descriptor: spec2026/gcc
# Single source of truth for this workload's measured peak RSS
# (consumed by run_characterization.sh USE_PEAK_RSS_RATIO sizing).
#
# Multi-invocation: refrate runs 3 independent sub-runs (gcc_1..gcc_3),
# each tracked as its own sub-run.  peak_rss_kb is the MAX across them;
# they run sequentially, so fast-tier sizing only needs to cover the
# largest.
# Per-sub-run peak RSS / wall clock (no instrumentation, NUMA node 0, 2026-07-13):
#   1: 991268 kB   3:05
#   2: 735000 kB   1:33
#   3: 752696 kB   3:29
#   => ~8:07 total wall for all 3 sub-runs
suite=spec2026
workload=gcc
peak_rss_kb=991268   #   ~968 MB  (max of 3 sub-runs, 2026-07-13)
