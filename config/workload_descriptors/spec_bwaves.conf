# Workload descriptor: spec/bwaves
# Single source of truth for this workload's measured peak RSS
# (consumed by run_characterization.sh USE_PEAK_RSS_RATIO sizing).
#
# Multi-invocation: refrate runs 4 independent sub-solves (bwaves_1..bwaves_4),
# each tracked as its own sub-run.  peak_rss_kb is the MAX across the four; they
# run sequentially, so fast-tier sizing only needs to cover the largest.
# Per-sub-run peak RSS / wall clock (no instrumentation, NUMA node 0, 2026-06-25):
#   bwaves_1: 842240 kB   2:08
#   bwaves_2: 842232 kB   3:21
#   bwaves_3: 772264 kB   2:38
#   bwaves_4: 830424 kB   3:11
#   => ~11.3 min total wall for all 4 sub-runs
suite=spec
workload=bwaves
peak_rss_kb=842240   #   ~822 MB  (max of 4 sub-runs, 2026-06-25)
