#   6: 683392 kB   0:39
#   7: 771428 kB   0:26
#   8: 10576 kB   1:40
#   9: 10532 kB   1:20
#   10: 10604 kB   2:52
#   => ~15:40 total wall for all 10 sub-runs
suite=spec2026
